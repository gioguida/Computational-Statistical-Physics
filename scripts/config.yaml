switches:
  build: true
  generate: true
  interaction: true
  anneal: true

build:
  build_dir: build

paths:
  training_hits_csv: data/training_hits.csv
  results_root: results/runs

run:
  run_id: auto  # set to an existing run folder for annealing-only runs

generation:
  enabled: true
  module: src.hits.data_gen
  data:
    n_particles: 20
    traj_radius_low: 4
    traj_radius_high: 20
    detector_layers: [1, 2, 3, 4, 5]
    sigma_res: 0.0
    mean_fakes_per_layer: 0.0

interaction:
  theta_max: 0.5235987755982988
  penalty: 10.0

annealing:
  t_min: 0.05
  t_max: 5.0
  t_step: 0.05
  toll: 0.001
  eq_sweeps: 50
  seed: 42
