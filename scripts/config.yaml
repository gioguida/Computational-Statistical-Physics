switches:
  build: true
  generate: true      # true
  interaction: true
  anneal: true

build:
  build_dir: build

paths:
  training_hits_csv: data/training_hits.csv
  results_root: results/runs

run:
  run_id: auto  # set to an existing run folder for annealing-only runs

generation:
  enabled: true
  module: src.hits.data_gen
  data:
    n_particles: 20   # 20
    traj_radius_low: 4
    traj_radius_high: 20
    detector_layers: [1, 2, 3, 4, 5]
    sigma_res: 0.05 # 0.05
    mean_fakes_per_layer: 2.0 # 2

interaction:
  theta_max: 0.35
  merge_penalty: 10.0
  fork_penalty: 10.0
  angle_penalty: 2.0
  layer_radius_penalty: 5.0

annealing:
  t_min: 0.05
  t_max: 5.0
  t_step: 0.1
  toll: 0.000001
  length_penalty: 0.5
  eq_sweeps: 100
  log_every_steps: 10
  seed: 42
